name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Registry Alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout ionrift-cloud (PACK_CATALOG source)
        uses: actions/checkout@v4
        with:
          repository: ionrift-gm/ionrift-cloud
          path: ionrift-cloud
          token: ${{ secrets.CLOUD_REPO_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Structural check only (--skip-live): does every registry `latest`
      # version have a matching key in PACK_CATALOG?
      # This gate blocks publishing a registry that advertises a version
      # the middleware doesn't know about (the Cursewright v1.1.2 failure mode).
      - name: Run release-readiness gate (structural)
        run: node ionrift-cloud/scripts/release-readiness.mjs --skip-live --skip-gcs --registry-path ./registry.json

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
